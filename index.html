<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2AM Reset To-Do</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* 기본 모바일 설정: 하단 광고 여백 */
        body {
            padding-bottom: 60px;
        }
        
        /* 모바일 하단 고정 배너 스타일 */
        .mobile-ad-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.05);
            z-index: 1000;
            padding: 5px 0;
        }

        /* PC용 사이드바 광고 스타일 */
        .ad-left {
            display: none; /* 기본적으로는 숨김 (모바일 우선) */
        }

        /* PC 환경 (화면 너비 1024px 이상) */
        @media (min-width: 1024px) {
            .mobile-ad-footer {
                display: none; /* PC에서는 하단 배너 숨김 */
            }
            body {
                padding-bottom: 0; /* 하단 여백 제거 */
            }
            .ad-left {
                display: block; /* PC에서만 왼쪽 사이드바 노출 */
                position: fixed;
                left: 20px;
                top: 50%;
                transform: translateY(-50%);
            }
            .main-wrapper {
                display: flex;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <aside class="ad-left">
            <ins class="kakao_ad_area" style="display:none;"
                data-ad-unit = "DAN-Ck2vDHjlCh92YiMx"
                data-ad-width = "160"
                data-ad-height = "600"></ins>
            <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
        </aside>

        <div class="container">
            <header>
                <h1>새벽2시마다 리셋되는 todo-list</h1>
                <button id="history-btn" title="기록 보기"><i class="fas fa-history"></i></button>
            </header>

            <div class="input-section">
                <input type="text" id="todo-input" placeholder="할 일을 입력하고 엔터를 누르세요..." autocomplete="off">
            </div>

            <ul id="todo-list"></ul>
        </div>
    </div>

    <div id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>지난 기록</h2>
            <button id="close-sidebar">&times;</button>
        </div>
        <div id="history-content"></div>
    </div>

    <div class="mobile-ad-footer">
        <ins class="kakao_ad_area" style="display:none;"
            data-ad-unit = "DAN-7bH8nXutAy5zvauE"
            data-ad-width = "320"
            data-ad-height = "50"></ins>
        <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
    </div>

    <script src="script.js"></script>
</body>
</html>
